name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.5). Leave empty to use the latest pushed tag.'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read CHANGELOG entry
        id: notes
        run: |
          node -e "
          const fs = require('fs');
          const tag = '${{ steps.tag.outputs.tag }}';
          const tagVer = tag.replace(/^v/, '');
          const log = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf8') : '';
          const re = new RegExp('##\\s*\\[?' + tagVer.replace(/\\./g, '\\\\.') + '[^\\n]*\\n([\\\\s\\\\S]*?)(?=\\n##\\s|\\$)');
          const m = log.match(re);
          process.stdout.write(m ? m[1].trim() : 'Release ' + tag);
          " > notes.md
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat notes.md >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
          fail_on_unmatched_files: false
