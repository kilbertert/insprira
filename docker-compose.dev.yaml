services:
  insprira:
    image: insprira:latest
    container_name: insprira-dev
    command: ["node", "--watch", "server.js"]
    volumes:
      - ./:/app
      - /app/node_modules
      - ./data:/data
    environment:
      HOST: 0.0.0.0
      DATA_DIR: /data
      NODE_ENV: development
    ports:
      - "8080:8080"
