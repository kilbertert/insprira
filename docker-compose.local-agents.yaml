# 本地 Agent CLI 映射 override
#
# 用法：
#   docker compose -f docker-compose.yaml -f docker-compose.local-agents.yaml up
#
# 适用：Linux x86_64 宿主 + 已在宿主装好 claude / kimi / codex CLI
# 原理：把宿主的 CLI 二进制和凭证目录只读挂进容器，AGENT_ADAPTER=local
#       让 insprira 直接 spawn 容器内可见的 CLI 路径
#
# 前提：
#   · 宿主和容器架构必须一致（Linux x86_64 ↔ linux/amd64 镜像）
#   · macOS / Windows 宿主不能用此模式（二进制是 mach-O / PE，不是 ELF）
#   · codex 的 .js 启动器需要 Node 24+（本镜像已是 node:24-slim）
#
# 验证：宿主跑 `which claude kimi codex` 看路径，确保 ${HOME}/.npm-global
#       或对应目录存在；凭证目录 ~/.claude* / ~/.kimi-code / ~/.codex 存在

services:
  insprira:
    environment:
      # 强制本地 spawn adapter，跳过 sbx 自动检测
      AGENT_ADAPTER: local
      # 指向挂进来的二进制（见下方 volumes）
      CLAUDE_BIN: /host/npm-global/bin/claude
      KIMI_BIN: /root/.kimi-code/bin/kimi
      CODEX_BIN: /host/npm-global/bin/codex
    volumes:
      # —— 数据卷（base 已有，这里不重复）——
      # —— CLI 二进制（只读）——
      # claude + codex 都装在 npm-global（npm i -g 装的）
      - ${HOME}/.npm-global:/host/npm-global:ro
      # kimi 单独安装在 ~/.kimi-code（其官方安装脚本位置）
      # 同时也是凭证目录，所以不标 :ro
      # —— 凭证目录 ——
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      - ${HOME}/.kimi-code:/root/.kimi-code
      - ${HOME}/.codex:/root/.codex
