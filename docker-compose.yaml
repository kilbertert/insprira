services:
  insprira:
    # 本地构建：先 `docker build -t insprira .`，再 `docker compose up -d`。
    # 如需临时切回远端镜像：把 build 注释掉、image 改成 `ghcr.io/coracoo/insprira:latest`
    build:
      context: .
      dockerfile: Dockerfile
    image: insprira:latest
    container_name: insprira
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # 必须：监听地址要改成 0.0.0.0，否则容器外无法访问
      HOST: 0.0.0.0
    volumes:
      # 持久化 SQLite 数据库、Skill 库、运行日志
      - ./data:/data
