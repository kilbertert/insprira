services:
  insprira:
    build:
      context: .
      dockerfile: Dockerfile
    image: insprira:latest
    container_name: insprira
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
    volumes:
      - ./data:/data
      - ./.env:/app/.env:ro
      - ./server.js:/app/server.js:ro
      - ./kb_wersss.js:/app/kb_wersss.js:ro
      - ./js:/app/js:ro
