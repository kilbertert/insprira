<link rel="icon" href="data:," />
<script>
  // 提前应用主题，避免 FOUC；详细逻辑在 js/theme.js
  (function () {
    try {
      var stored = localStorage.getItem('furnace.theme');
      var theme = stored ? JSON.parse(stored) : null;
      if (theme !== 'dark' && theme !== 'light') {
        theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- INSPIRATION -->
<template id="tpl-inspiration">
<div class="p-6 space-y-5">

          <button class="btn btn-primary py-1.5 text-xs ml-auto" data-action="doRewrite" id="doRewriteBtn"><i data-lucide="wand-sparkles" class="w-3.5 h-3.5"></i><span id="doRewriteLabel">开始重构</span></button>
        </div>
        <div id="rewriteHotspotPanel" class="hidden mb-4 rounded-lg border border-white/10 bg-black/20 p-3">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs font-semibold">相关实时热点</div>
            <button class="text-[11px] text-gray-500 hover:text-gray-300" data-action="clearSelectedHotspot">不蹭热点</button>
          </div>
          <div id="rewriteKeywords" class="flex flex-wrap gap-1.5 mb-3"></div>
          <div id="rewriteHotspotSource" class="text-[11px] text-gray-500 mb-2"></div>
          <div id="rewriteHotspotList" class="space-y-2"></div>
        </div>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-gray-400 mb-1.5 block">标题</label>
            <input class="input text-sm" id="rewriteTitle" placeholder="生成后的标题" />
          </div>
          <div>
            <label class="text-xs text-gray-400 mb-1.5 block">前言</label>
            <textarea class="input min-h-[90px] resize-y text-sm leading-relaxed" id="rewriteIntro" placeholder="热点主要在标题和前言中自然结合"></textarea>
          </div>
          <div>
            <label class="text-xs text-gray-400 mb-1.5 block">正文</label>
            <textarea class="input min-h-[240px] resize-y text-sm leading-relaxed" id="rewriteResult" placeholder="生成结果会显示在这里"></textarea>
          </div>
        </div>
        <div class="flex gap-2 mt-2">
          <button class="btn btn-ghost py-1.5 text-xs" data-action="copyRewrite"><i data-lucide="copy" class="w-3.5 h-3.5"></i>复制成稿</button>
          <select id="exportKbTarget" class="input text-xs py-1" style="width:auto">
            <option value="obsidian">→ Obsidian</option>
            <option value="notion">→ Notion</option>
          </select>
          <button class="btn btn-ghost py-1.5 text-xs" data-action="exportToKb"><i data-lucide="book-plus" class="w-3.5 h-3.5"></i>导出知识库</button>
        </div>
      </div>
      <div class="panel-forged p-4">
        <h3 class="text-sm font-semibold mb-3 flex items-center gap-1.5"><i data-lucide="image-plus" class="w-3.5 h-3.5 text-amber-400"></i>④ AI 封面</h3>
        <div class="flex gap-2">
          <select class="input py-1.5 text-xs" id="coverSize" style="width:auto">
            <option value="1024x1024">方图 1:1</option>
            <option value="1024x1536">竖图 2:3</option>
            <option value="1536x1024">横图 3:2</option>
          </select>
          <button class="btn btn-ghost py-1.5 text-xs" data-action="generateCover"><i data-lucide="image-plus" class="w-3.5 h-3.5"></i>根据成稿生成封面</button>
        </div>
        <div id="coverResult" class="mt-3 text-xs text-gray-500">生成图片会消耗 RedFox 点数，提交前请确认提示词。</div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- SKILLS -->
<template id="tpl-skills">
<div class="p-6 space-y-5">
  <div class="page-header">
    <div>
      <div class="page-header-title"><i data-lucide="blocks" class="w-5 h-5 text-purple-400"></i>Skill 中心</div>
      <div class="page-header-sub">本地 RedFox 社区 Skills，可查看说明并交给 Agent 执行</div>
    </div>
    <div class="page-header-actions">
      <span class="text-[11px] text-gray-500" id="skill-update-status">正在检查更新…</span>
      <button class="btn btn-ghost py-1.5 text-xs" data-action="checkSkillUpdates"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>检查更新</button>
      <button class="btn btn-primary py-1.5 text-xs hidden" id="skill-update-button" data-action="updateCommunitySkills"><i data-lucide="download" class="w-3.5 h-3.5"></i>一键更新</button>
      <button class="btn btn-ghost py-1.5 text-xs" data-action="classifySkills" title="只分析新增/变化的 skill"><i data-lucide="wand-2" class="w-3.5 h-3.5"></i>LLM 分类</button>
      <button class="btn btn-ghost py-1.5 text-xs" data-action="forceReclassifySkills" title="强制重新分析所有 skill，忽略缓存"><i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>强制重分类</button>
      <span class="pill pill-green" id="skill-local-count">读取中…</span>
    </div>
  </div>
  <div class="page-section space-y-4">
    <div class="flex gap-2">
      <input class="input search-input max-w-xl" id="skillSearch" placeholder="搜索 Skill 名称、描述或平台…" />
      <select class="input" id="skillCategory" style="width:auto">
        <option value="all">全部分类</option>
        <option value="热点">热点</option>
        <option value="创作">创作</option>
        <option value="分析">分析</option>
        <option value="检索">检索</option>
        <option value="生成工具">生成工具</option>
      </select>
    </div>
    <div id="skill-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
  </div>
</div>
</template>

<!-- AGENT -->
<template id="tpl-agent">
<div class="p-6 space-y-5">
  <div class="page-header">
    <div>
      <div class="page-header-title"><i data-lucide="bot" class="w-5 h-5 text-cyan-400"></i>Agent 对话</div>
      <div class="page-header-sub">调用本地 Agent CLI 执行 Skill 与项目任务</div>
    </div>
  </div>
  <div class="grid grid-cols-1 lg:grid-cols-[260px_minmax(0,1fr)] gap-5 lg:h-[calc(100vh-11rem)] lg:min-h-[620px]">
    <aside class="glass rounded-xl p-4 flex flex-col min-h-0 h-[300px] lg:h-full">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h2 class="text-sm font-semibold text-gray-200">对话记录</h2>
          <p class="text-[10px] text-gray-600 mt-0.5">本地保存的 Agent 会话</p>
        </div>
        <button class="btn btn-ghost py-1.5 px-2 text-xs" data-action="startNewAgentThread" title="新建对话">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        </button>
      </div>
      <div id="agent-thread-list" class="flex-1 min-h-0 overflow-y-auto space-y-1 pr-1 scrollbar-thin"></div>
      <div class="mt-3 rounded-xl border border-white/10 bg-white/[0.02] p-3 space-y-3">
        <div>
          <label class="text-[10px] text-gray-500 mb-1.5 block">Agent</label>
          <select class="input text-xs py-2" id="agentProvider"><option value="">读取本地 Agent…</option></select>
          <p class="text-[10px] text-gray-600 mt-1.5 leading-relaxed" id="agent-provider-status">正在检测本地 CLI…</p>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 mb-1.5 block">权限模式</label>
          <select class="input text-xs py-2" id="agentMode">
            <option value="read">只读分析</option>
            <option value="workspace">允许修改项目</option>
          </select>
        </div>
      </div>
    </aside>

    <section class="glass-strong rounded-xl p-5 flex flex-col min-w-0 min-h-0 h-[620px] lg:h-full">
      <div class="flex items-center justify-between gap-4 pb-4">
        <div class="flex items-center gap-2 min-w-0">
          <i data-lucide="bot" class="w-4 h-4 text-cyan-400 flex-shrink-0"></i>
          <div class="min-w-0">
            <div class="text-sm font-medium truncate" id="agent-current-name">本地 Agent</div>
            <div class="text-[10px] text-gray-500 mt-0.5 truncate" id="agent-thread-name">新对话</div>
          </div>
        </div>
        <button class="btn btn-ghost py-2 px-3 text-xs flex-shrink-0" data-action="clearCurrentAgentThread" title="清空对话">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>清空
        </button>
      </div>

      <div class="flex-1 min-h-0 rounded-xl border border-white/10 bg-black/10 overflow-hidden flex flex-col">
        <div id="agentMessages" class="flex-1 min-h-0 overflow-y-auto space-y-4 p-4 scrollbar-thin">
          <div class="h-full min-h-[240px] flex items-center justify-center text-center" data-agent-empty>
            <div class="rounded-xl border border-dashed border-white/10 bg-white/[0.02] px-8 py-7">
              <i data-lucide="message-square" class="w-9 h-9 text-gray-600 mx-auto mb-3"></i>
              <p class="text-sm text-gray-400">开始一段新对话</p>
              <p class="text-xs text-gray-600 mt-1">输入 <code class="text-purple-300">/</code> 可选择 Skill</p>
            </div>
          </div>
        </div>
        <div id="agent-streaming" class="hidden flex items-center gap-2 mx-4 mb-3 rounded-lg border border-cyan-500/20 bg-cyan-500/10 px-3 py-2 text-xs text-cyan-400">
          <i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i>
          <span id="agent-streaming-text">Agent 正在思考…</span>
        </div>
      </div>

      <div class="mt-4 rounded-xl border border-white/10 bg-white/[0.02] p-3">
        <div class="flex gap-3 items-end relative">
          <div class="flex-1 relative">
            <div id="agentSkillCommands" class="hidden absolute left-0 right-0 bottom-full mb-2 max-h-64 overflow-y-auto glass-strong rounded-xl p-2 z-20"></div>
            <textarea class="input min-h-[72px] resize-y" id="agentInput" placeholder="输入 / 选择 Skill，例如：/wechat-account-analyzer 诊断"></textarea>
          </div>
          <button class="btn btn-primary h-10 flex-shrink-0" id="agentSend" data-action="sendAgentMessage">
            <i data-lucide="send" class="w-4 h-4"></i>发送
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
</template>

<template id="tpl-my">
<div class="p-6 space-y-5">
  <div class="page-header">
    <div>
      <div class="page-header-title"><i data-lucide="user-circle" class="w-5 h-5 text-purple-400"></i>我的</div>
      <div class="page-header-sub" id="my-sub">管理个人账号、提炼赛道与创作风格档案</div>
    </div>
    <div class="page-header-actions">
      <button class="btn btn-primary" data-action="addMyAccount"><i data-lucide="plus" class="w-4 h-4"></i>添加我的账号</button>
    </div>
  </div>
  <div id="my-account-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  <div id="my-empty" class="hidden text-center py-16 text-gray-500">
    <i data-lucide="user-plus" class="w-12 h-12 mx-auto mb-3 opacity-30"></i>
    <div>还没有添加个人账号</div>
    <p class="text-xs text-gray-600 mt-2">点击「添加我的账号」开始</p>
  </div>
</div>
</template>

<!-- SETTINGS -->
<template id="tpl-settings">
<div class="p-6 w-full max-w-none space-y-5">
  <div class="page-header">
    <div>
      <div class="page-header-title"><i data-lucide="settings" class="w-5 h-5 text-purple-400"></i>设置</div>
      <div class="page-header-sub">API Key、定时任务、通知渠道与自动选题配置</div>
    </div>
  </div>
  <div id="kb-insecure-banner" class="hidden bg-red-500/10 border border-red-500/40 rounded-xl p-4 flex items-start gap-3">
    <i data-lucide="alert-triangle" class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5"></i>
    <div class="min-w-0">
      <div class="font-semibold text-red-300">知识库加密未启用</div>
      <div class="text-xs text-red-200/80 mt-1"><code class="text-red-200">KB_ENCRYPTION_KEY</code> 未配置，Notion 等知识库凭证使用默认弱密钥加密，<b>cache.db 一旦泄漏即等于凭证泄漏</b>。请在 <code class="text-red-200">.env</code> 设置 <code class="text-red-200">KB_ENCRYPTION_KEY</code>（生成命令：<code class="text-red-200">openssl rand -hex 32</code>），重启服务生效。</div>
    </div>
  </div>
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-5 items-stretch">
  <div class="glass rounded-xl p-4 min-w-0 h-[240px] flex flex-col">
    <div class="settings-card-head">
      <div class="min-w-0">
        <h2 class="settings-card-title"><i data-lucide="timer" class="w-4 h-4 text-cyan-400"></i>自动选题主题</h2>
        <p class="text-[11px] text-gray-500 mt-1">配置关键词、黑白名单、数据来源、API 预算和生成 CRON</p>
      </div>
      <button class="btn btn-primary py-1.5 px-2.5 text-xs flex-shrink-0" data-action="openInspirationConfigModal"><i data-lucide="plus" class="w-3.5 h-3.5"></i>新建</button>
    </div>
    <div id="inspiration-config-list" class="space-y-3 overflow-y-auto scrollbar-thin pr-1 flex-1 min-h-0"></div>
  </div>
  <div class="glass rounded-xl p-4 min-w-0 h-[240px] flex flex-col">
    <div class="settings-card-head"><h2 class="settings-card-title"><i data-lucide="key" class="w-4 h-4 text-purple-400"></i>API Key 与环境</h2><div class="flex gap-1.5 flex-shrink-0"><button class="btn btn-ghost py-1.5 px-2.5 text-xs" data-action="openEnvModal"><i data-lucide="settings" class="w-3.5 h-3.5"></i>维护</button><button class="btn btn-ghost py-1.5 px-2.5 text-xs text-amber-300" data-action="restartService"><i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>重启</button><button class="btn btn-ghost py-1.5 px-2.5 text-xs" data-action="openRedfoxApply"><i data-lucide="external-link" class="w-3.5 h-3.5"></i>申请 API</button></div></div>
    <div class="space-y-3 overflow-y-auto scrollbar-thin pr-1 flex-1 min-h-0">
      <p class="text-xs text-gray-400">密钥只从服务端 <code class="text-purple-300">.env</code> 读取，不再返回给浏览器。</p>
      <div class="p-3 bg-white/[0.02] rounded-lg space-y-2">
        <div class="flex items-center justify-between"><span class="text-sm">RedFox API</span><span class="pill pill-green" id="api-status-pill"><i data-lucide="check" class="w-3 h-3"></i>在线</span></div>
        <div class="flex items-center justify-between"><span class="text-sm">LLM 服务</span><span class="pill pill-green" id="llm-status-pill"><i data-lucide="check" class="w-3 h-3"></i>在线</span></div>
        <div class="text-[11px] text-gray-500" id="api-detail">连接状态读取中</div>
      </div>
    </div>
  </div>
  <div class="glass rounded-xl p-4 min-w-0 flex flex-col">
    <div class="settings-card-head">
      <h2 class="settings-card-title"><i data-lucide="gauge" class="w-4 h-4 text-amber-400"></i>API 额度与用量</h2>
      <button class="btn btn-ghost py-1.5 text-xs" data-action="loadQuota"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>刷新</button>
    </div>
    <div id="quota-content" class="text-xs text-gray-500 flex-1">读取中…</div>
  </div>
  </div>
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-5 items-stretch">
  <div class="glass rounded-xl p-5 min-w-0 h-[620px] flex flex-col">
    <div class="settings-card-head">
      <h2 class="settings-card-title"><i data-lucide="clock" class="w-4 h-4 text-cyan-400"></i>定时任务</h2>
      <button class="btn btn-primary py-1.5 text-xs" data-action="openCronModal"><i data-lucide="plus" class="w-3.5 h-3.5"></i>新建任务</button>
    </div>
    <div id="cron-list" class="grid grid-cols-2 gap-2 overflow-y-auto scrollbar-thin pr-1 flex-1 min-h-0 content-start"></div>
    <p class="text-[11px] text-gray-500 mt-3" id="scheduler-status">读取中…</p>
  </div>
  <div class="glass rounded-xl p-5 min-w-0 h-[620px] flex flex-col">
    <div class="settings-card-head"><div><h2 class="settings-card-title"><i data-lucide="message-circle" class="w-4 h-4 text-indigo-400"></i>通知渠道</h2><p class="text-[11px] text-gray-500 mt-1">密钥保存在服务端，设置页明文显示。</p></div><button class="btn btn-primary py-1.5 px-2.5 text-xs flex-shrink-0" data-action="saveNotificationSettings"><i data-lucide="save" class="w-3.5 h-3.5"></i>保存</button></div>
    <form id="notification-list" class="space-y-3 overflow-y-auto scrollbar-thin pr-1 flex-1 min-h-0"></form>
  </div>
  </div>
</div>
</template>

<!-- ============= Add Account Modal ============= -->
<div id="modal-host"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
